# ─── Catégories retirées lors de l'audit du 2026-04-27 ───────────────────
# Les catégories `editeurs_simu`, `metallurgie` et `auto` ont été supprimées
# car aucun employeur correspondant n'expose encore une API ATS publique
# exploitable (les éditeurs de simu — Ansys, Cadence, Synopsys, Altair, ESI —
# et les constructeurs auto FR ont migré vers Workday / SuccessFactors).
# Si un slug valide est retrouvé pour l'un d'eux (via le script d'audit),
# ré-ajouter d'abord la catégorie ici puis l'entrée `company` correspondante.
