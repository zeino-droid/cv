# ════════════════════════════════════════════════════════════════════════════
# Liste curatée d'employeurs Simu / R&D / CFD / Énergie en France
# Utilisée par engine/sourcing/companies_watcher.py
#
# `ats` peut valoir : "greenhouse" | "lever" | "workable" | "smartrecruiters"
# Si l'entreprise n'expose pas d'API ATS publique, on l'omet plutôt que de
# scraper son site (anti-pattern).
#
# `slug` = identifiant utilisé dans l'URL d'API. Exemples :
#   greenhouse      → https://boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   lever           → https://api.lever.co/v0/postings/{slug}?mode=json
#   workable        → https://apply.workable.com/api/v1/widget/accounts/{slug}
#   smartrecruiters → https://api.smartrecruiters.com/v1/companies/{slug}/postings
#
# Pour ajouter une entreprise :
#   1. Trouver son ATS : aller sur sa page carrières et regarder l'URL/réseau.
#   2. Identifier le slug (souvent le nom dans l'URL).
#   3. Tester avec le script d'audit :
#        python scripts/audit_target_companies.py
#      ou pour un seul slug :
#        python scripts/audit_target_companies.py smartrecruiters MonSlug
#   4. Si l'API renvoie du JSON avec des offres → ajouter ici.
#
# ─── Audit du 2026-04-27 ────────────────────────────────────────────────
# Les slugs SmartRecruiters initiaux pour les majors industriels n'étaient
# plus valides : Dassault Systèmes, Hexagon, ArcelorMittal, Safran,
# TotalEnergies, Forvia/Faurecia, Valeo retournaient 0 offres (ces
# entreprises ont migré vers Workday / SAP SuccessFactors / leur propre
# plateforme, qui n'exposent pas d'API publique).
#
# Recherche publique (CEA, CNRS, Onera, INRIA, IFPEN, Orano, EDF, RTE,
# Naval Group, MBDA, ArianeGroup, Dassault Aviation) : aucun n'expose un
# slug SmartRecruiters/Greenhouse/Lever/Workable exploitable. Le projet
# `simu-skills.fr` ou un crawler dédié serait nécessaire — hors scope du
# Companies Watcher actuel.
# ════════════════════════════════════════════════════════════════════════════

companies:

  # ─── Aéronautique & Défense ────────────────────────────────────────────
  # Thales : seul major aéro/défense FR avec API SR publique active.
  # Volume très faible (la majorité des postes passe par leur propre site
  # talent.thalesgroup.com), mais l'endpoint répond → on garde.
  - name: "Thales"
    category: "aero_defense"
    ats: "smartrecruiters"
    slug: "Thales"

  # ─── Sociétés d'ingénierie & R&D externalisée ──────────────────────────
  # Cœur de cible : ces ESN d'ingénierie placent des consultants en simu /
  # CFD / R&D chez les grands donneurs d'ordre (Safran, Stellantis, EDF…).
  - name: "ALTEN"
    category: "rd_services"
    ats: "smartrecruiters"
    slug: "ALTEN"

  - name: "Segula Technologies"
    category: "rd_services"
    ats: "smartrecruiters"
    slug: "SegulaTechnologies"

  - name: "Assystem"
