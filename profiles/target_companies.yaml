  # ─── Énergie / transition énergétique ──────────────────────────────────
  - name: "Verkor"
    category: "energie"
    ats: "lever"
    slug: "verkor"

  # ─── Tech / R&D Paris (Greenhouse / Lever — ATS très répandus) ─────────
  - name: "Doctolib"
    category: "tech_rd"
    ats: "greenhouse"
    slug: "doctolib"

  - name: "BlaBlaCar"
