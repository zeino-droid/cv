search:
  keywords:
    # ── CORE (priorité 1 — passent en premier dans la matrice de paires) ──
    - "Ingénieur CFD"
    - "Ingénieur simulation numérique"
    - "Ingénieur éléments finis"
    - "Ingénieur modélisation thermique"
    - "Ingénieur calcul mécanique"
    # ── SECONDAIRES (priorité 2) ──
    - "Ingénieur R&D simulation"
    - "Ingénieur thermique énergie"
    - "Ingénieur R&D énergie"
    - "Ingénieur procédés industriels"
    - "Ingénieur R&D Python"

  locations:
    # ── Villes CORE (priorité 1) ──
    - "Paris, France"
    - "Lyon, France"
    - "Grenoble, France"
    - "Toulouse, France"
    - "Sophia Antipolis, France"
    # ── Villes SECONDAIRES (priorité 2) ──
    - "Bordeaux, France"
    - "Nice, France"
    - "Montpellier, France"
    - "Aix-en-Provence, France"
    - "Marseille, France"
    # ── Fallback national (priorité 3 — toujours en dernier) ──
    - "France"

  # [FIX-12] 720h = 30 jours. À 168h (7 j) la majorité des offres niche
  # (CFD/EF/R&D thermique) renvoient 0 — ces postes restent ouverts plusieurs
  # semaines. À remonter à 168 quand le pipeline trouve assez d'offres fraîches.
  hours_old: 720

  results_per_query: 20

  # [FIX-12] job_type retiré : beaucoup d'offres CDI n'ont pas de métadonnée
  # job_type côté scraper et étaient éliminées silencieusement par le filtre
  # "fulltime". Le filtrage stage/alternance se fait maintenant via le scoring
  # (HARD_TITLE_EXCLUDES) appliqué au TITRE uniquement [FIX-2].

  sites:
    # [FIX-10] zip_recruiter SUPPRIMÉ : couverture US/CA uniquement → renvoyait
    # silencieusement 0 offres pour toutes les requêtes France.
    # indeed AJOUTÉ : indeed.fr est la 1ʳᵉ source d'offres CDI en France.
    - "google"
    - "indeed"
    - "glassdoor"

filters:
  # [FIX NOTE] min_score abaissé à 20 pour recalibration.
  # [FIX-14] Si 0 offre n'atteint ce seuil, le pipeline retombe automatiquement
  # sur les 25 meilleures (fallback) plutôt que de renvoyer une liste vide.
  # Observer la distribution des scores sur 2-3 runs, puis remonter à 35.
  min_score: 20

  exclude_keywords:
    # [FIX-2] IMPORTANT : ces termes filtrent uniquement sur le TITRE.
    # PhD / doctorat / thèse ont été RETIRÉS — les offres R&D industrielles
    # (votre cible) mentionnent souvent "Bac+5 ou PhD apprécié" dans la
    # description sans être des postes de doctorant.
    - "stage"
    - "stagiaire"
    - "alternance"
    - "apprenti"

scoring:
  base_score: 20
  per_skill_match: 8

  # [FIX-7] Le matching de compétences utilise des alias définis dans
  # sourcing_advanced.py (SKILL_ALIASES). Ex: "Abaqus" matchera aussi
  # "Abaqus/CAE", "éléments finis" matchera "FEM", "FEA", "EF",
  # "finite element".
  premium_keywords:
    simulation: 5
    modélisation: 5
    thermique: 4
    CFD: 5
    énergie: 4
    Python: 4
    Abaqus: 6
    Ansys: 5
    Fluent: 5
    mécanique: 3
    thermomécanique: 5
    décarbonation: 4
    procédés: 3
    Matlab: 3
    Metafor: 6
    # Termes anglais fréquents dans les offres FR
    "finite element": 5
    "numerical simulation": 4
    "heat transfer": 4
    "digital twin": 5
    "FEM": 5
    "FEA": 5

  preferred_locations:
    - paris
    - lyon
    - grenoble
    - toulouse
    - sophia
    - bordeaux
    - nice
    - montpellier
    - aix
    - marseille

  location_bonus: 5
  stage_penalty: -50
