# ════════════════════════════════════════════════════════════════════════════
# Configuration du sourcing France-First
#
# Ce fichier pilote 3 sources :
#   • France Travail (codeROME + département)
#   • Adzuna         (keywords libres)
#   • Companies Watcher (catégorie d'employeurs définie dans target_companies.yaml)
#
# Le scoring (heuristique + Gemini) reste partagé entre toutes les sources.
# ════════════════════════════════════════════════════════════════════════════

search:
  # ── Codes ROME (France Travail) — référentiel métier officiel français ──
  # H1206 — Management et ingénierie études, recherche et développement industriel  ★ CORE profil
  # H1402 — Management et ingénierie méthodes de production
  # H1502 — Management et ingénierie qualité industrielle
  # H2502 — Management et ingénierie de production
  # H1208 — Intervention technique en études et conception en automatisme
  # H1404 — Intervention technique en méthodes et industrialisation
  # M1805 — Études et développement informatique (pour les postes Python R&D)
  rome_codes:
    - "H1206"
    - "H1402"
    - "H1502"
    - "H2502"
    - "H1208"
    - "H1404"

  # ── Mots-clés (Adzuna + Companies Watcher) ──
  keywords:
    - "Ingénieur simulation"
    - "Ingénieur CFD"
    - "Ingénieur calcul mécanique"
    - "Ingénieur éléments finis"
    - "Ingénieur R&D"
    - "Simulation engineer"
    - "CFD engineer"

  # ── Régions / départements (France Travail) ──
  # Codes département INSEE : 75=Paris, 69=Rhône, 31=Hte-Garonne, 33=Gironde,
  # 38=Isère, 06=Alpes-Maritimes, 13=B-du-R, 92=Hauts-de-Seine, 78=Yvelines.
  # Liste vide = recherche nationale.
  departments_options:
    - { code: "75", label: "Paris (75)" }
    - { code: "92", label: "Hauts-de-Seine (92)" }
    - { code: "78", label: "Yvelines (78)" }
    - { code: "69", label: "Rhône / Lyon (69)" }
    - { code: "31", label: "Haute-Garonne / Toulouse (31)" }
    - { code: "33", label: "Gironde / Bordeaux (33)" }
    - { code: "38", label: "Isère / Grenoble (38)" }
    - { code: "06", label: "Alpes-Maritimes / Sophia (06)" }
    - { code: "13", label: "Bouches-du-Rhône / Marseille (13)" }
    - { code: "44", label: "Loire-Atlantique / Nantes (44)" }

  publiee_depuis: 31      # France Travail : 1, 3, 7, 14, 31 jours acceptés
  max_per_query: 100      # cap pagination par département

filters:
  min_score: 20
  exclude_keywords:
    - "stage"
    - "stagiaire"
    - "alternance"
    - "apprenti"

scoring:
  base_score: 20
  per_skill_match: 8

  premium_keywords:
    simulation: 5
    modélisation: 5
    thermique: 4
    CFD: 5
    énergie: 4
    Python: 4
    Abaqus: 6
    Ansys: 5
    Fluent: 5
    mécanique: 3
    thermomécanique: 5
    décarbonation: 4
    procédés: 3
    Matlab: 3
    Metafor: 6
    "finite element": 5
    "numerical simulation": 4
    "heat transfer": 4
    "digital twin": 5
    "FEM": 5
    "FEA": 5

  preferred_locations:
    - paris
    - lyon
    - grenoble
    - toulouse
    - sophia
    - bordeaux
    - nice
    - montpellier
    - aix
    - marseille
    - nantes
    - rennes

  location_bonus: 5
  stage_penalty: -50
