# ════════════════════════════════════════════════════════════════════════════
# Configuration du sourcing France-First — V3 (Recentrée Calcul Structures)
#
# DIAGNOSTIC V2 : Le sourcing ramenait trop d'offres CFD/Fluent/ENR alors
# que le cœur de compétence du candidat est Abaqus + Calcul de Structures.
# V3 recentre les keywords, codes ROME et premium scoring sur la réalité.
# ════════════════════════════════════════════════════════════════════════════

search:
  # ── Codes ROME — Recentrés sur le cœur de métier ──
  # H1206 — Management et ingénierie études, R&D industriel    ★ CORE
  # H1210 — Animation d'activités de R&D                       ★ CORE
  # H1203 — Conception et dessin produits mécaniques (BE Méca)  ★ AJOUTÉ V3
  rome_codes:
    - "H1206"
    - "H1210"
    - "H1203"

  # ── Mots-clés — Recentrés sur Abaqus / FEA / Bureau d'Études ──
  # V3 : Retiré "Ingénieur CFD", "CFD engineer", "Ingénieur ENR"
  # V3 : Ajouté calcul structures, dimensionnement, bureau d'études mécanique
  keywords:
    - "Ingénieur calcul de structures"
    - "Ingénieur éléments finis"
    - "Ingénieur simulation numérique"
    - "Ingénieur dimensionnement"
    - "Ingénieur bureau d'études mécanique"
    - "Ingénieur R&D mécanique"
    - "Ingénieur calcul FEA"
    - "Ingénieur modélisation"
    - "Ingénieur bureau d'études calcul"
    - "Ingénieur thermique"
    - "Simulation engineer"

  # ── Régions / départements ──
  departments_options:
    - { code: "75", label: "Paris (75)" }
    - { code: "92", label: "Hauts-de-Seine (92)" }
    - { code: "78", label: "Yvelines (78)" }
    - { code: "91", label: "Essonne (91)" }
    - { code: "69", label: "Rhône / Lyon (69)" }
    - { code: "31", label: "Haute-Garonne / Toulouse (31)" }
    - { code: "33", label: "Gironde / Bordeaux (33)" }
    - { code: "38", label: "Isère / Grenoble (38)" }
    - { code: "06", label: "Alpes-Maritimes / Sophia (06)" }
    - { code: "13", label: "Bouches-du-Rhône / Marseille (13)" }
    - { code: "44", label: "Loire-Atlantique / Nantes (44)" }
    - { code: "54", label: "Meurthe-et-Moselle / Nancy (54)" }

  publiee_depuis: 14
  max_per_query: 100

filters:
  min_score: 15
  exclude_keywords:
    - "stage"
    - "stagiaire"
    - "alternance"
    - "apprenti"

scoring:
  base_score: 10

  per_skill_match: 5

  # V3 : Premium keywords recalibrés selon le VRAI niveau du candidat
  # Abaqus/Structures = cœur → scores max
  # Fluent/CFD = TP uniquement → scores bas
  premium_keywords:
    # ── Cœur de métier (Abaqus / FEA / Structures) ──
    Abaqus: 12
    "éléments finis": 10
    "FEA": 10
    "FEM": 8
    "calcul de structures": 10
    "non-linéaire": 8
    flambage: 8
    Metafor: 8
    RDM: 8
    dimensionnement: 7
    "bureau d'études": 7
    simulation: 5
    modélisation: 5
    mécanique: 4
    thermomécanique: 6
    "tenue mécanique": 8
    "notes de calcul": 7
    "dossiers justificatifs": 6
    composites: 5

    # ── Compétences secondaires (thermique, Python) ──
    thermique: 4
    Python: 3
    Matlab: 3
    "transferts thermiques": 4
    "jumeau numérique": 5
    "digital twin": 5
    "numerical simulation": 4
    "finite element": 7
    "heat transfer": 3

    # ── CFD/Fluent = score BAS (pas ton point fort) ──
    CFD: 2
    Fluent: 2
    Ansys: 5

    # ── Bonus junior / jeune diplômé ──
    "jeune diplômé": 4
    "débutant accepté": 4
    junior: 3

  preferred_locations:
    - paris
    - lyon
    - grenoble
    - toulouse
    - sophia
    - bordeaux
    - nice
    - montpellier
    - aix
    - marseille
    - nantes
    - rennes
    - nancy
    - metz

  location_bonus: 5
  stage_penalty: -50
