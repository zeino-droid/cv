services:
  dashboard:
    container_name: job-copilot-dashboard
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dashboard
    command:
      - streamlit
      - run
      - Dashboard.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.enableCORS=false
      - --server.enableXsrfProtection=false
    env_file:
      - ../../.env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    ports:
      - "8501:8501"
    volumes:
      - ../..:/app
    restart: unless-stopped
