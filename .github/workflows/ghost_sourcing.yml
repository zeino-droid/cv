name: 👻 Ghost-Sourcing

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Allows manual trigger

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push generated CVs/Letters back to the repo

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install Typst if not already in requirements (for PDF rendering)
          # Assuming it's handled via a python wrapper or pre-installed
          
      - name: 🎭 Install Typst (if needed)
        run: |
          if ! command -v typst &> /dev/null; then
            curl -L https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar -xJ
            sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
          fi

      - name: 👻 Run Ghost-Sourcing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FT_CLIENT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET: ${{ secrets.FT_CLIENT_SECRET }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scripts/ghost_sourcing.py

      - name: 🚀 Commit & Push findings
        run: |
          git config --global user.name "Ghost-Sourcing Bot"
          git config --global user.email "ghost-bot@users.noreply.github.com"
          git add vault/ storage/jobs.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "👻 Ghost-Sourcing: Found new Golden matches" && git push)
